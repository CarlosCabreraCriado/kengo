<section class="detail-page">
  <!-- Aurora Background -->
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-wave aurora-wave-1"></div>
    <div class="aurora-wave aurora-wave-2"></div>
    <div class="aurora-wave aurora-wave-3"></div>
  </div>

  <!-- Compact Header (mobile only) -->
  @if (isMovil()) {
    <header class="header-glass sticky top-0 z-50 shrink-0 px-4 pt-3 pb-4">
      <div class="header-content">
        <div class="header-left">
          <button
            type="button"
            class="back-btn"
            aria-label="Volver a pacientes"
            (click)="volver()"
          >
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h1 class="titulo-kengo header-title">Paciente</h1>
        </div>
        <button
          type="button"
          class="header-action"
          aria-label="Gestionar acceso"
          (click)="gestionarAcceso()"
        >
          <span class="material-symbols-outlined">key</span>
        </button>
      </div>
    </header>
  }

  <!-- Main Content -->
  <main class="detail-main" [class.pt-desktop]="!isMovil()">
    <!-- Loading State -->
    @if (isLoadingPaciente()) {
      <div class="state-card loading-state">
        <div class="shimmer-effect"></div>
        <div class="state-icon pulse">
          <span class="material-symbols-outlined">person</span>
        </div>
        <p class="state-text">Cargando paciente...</p>
      </div>
    }

    <!-- Error State -->
    @if (error()) {
      <div class="state-card error-state animate-in">
        <div class="state-icon error">
          <span class="material-symbols-outlined">error</span>
        </div>
        <h2 class="state-title">Algo salió mal</h2>
        <p class="state-text">{{ error() }}</p>
        <button type="button" class="retry-btn" (click)="volver()">
          <span class="material-symbols-outlined">arrow_back</span>
          Volver a pacientes
        </button>
      </div>
    }

    <!-- Patient Content -->
    @if (!isLoadingPaciente() && !error() && paciente()) {
      <div class="content-grid">
        <!-- Main Column -->
        <div class="main-column">
          <app-paciente-hero-card
            [paciente]="paciente()"
            [fullName]="fullName()"
            [avatarUrl]="avatarUrl()"
            [clinicaNombre]="clinicaNombre()"
            [fisioResponsableNombre]="fisioResponsableNombre()"
            [isMobile]="isMovil()"
            (editarPaciente)="editarPaciente()"
            (gestionarAcceso)="gestionarAcceso()"
            (crearPlan)="crearPlan()"
            (volver)="volver()"
          />

          <!-- Recent Activity Section -->
          <app-paciente-actividad-reciente
            [sesionesVisibles]="sesionesVisibles()"
            [totalSesiones]="sesionesEnriquecidas().length"
            [isLoading]="isLoadingSesiones()"
            [rangoLabel]="rangoLabel()"
            [diasProgramados]="diasProgramados()"
            [diasSinActividad]="diasSinActividad()"
            [filtroRango]="filtroRango()"
            [fechaExpandida]="sesionExpandida()"
            [notificacionesPorRegistro]="notificacionesPorRegistro()"
            [defaultExpanded]="!isMovil()"
            (verSesion)="verSesion($event)"
            (toggleComentarios)="toggleComentarios($event)"
            (marcarComentarioRevisado)="marcarComentarioRevisado($event)"
          />

        </div>

        <!-- Sidebar Column -->
        <aside class="sidebar-column">
          <!-- Statistics Section -->
          <app-paciente-estadisticas
            [estadisticas]="estadisticas()"
            [isLoading]="isLoadingEstadisticas()"
            [filtroRango]="filtroRango()"
            [filtroDesde]="filtroDesde()"
            [filtroHasta]="filtroHasta()"
            [isCustomRange]="isCustomRange()"
            [rangoLabel]="rangoLabel()"
            [filterPanelOpen]="filterPanelOpen()"
            [hoy]="hoy"
            [defaultExpanded]="!isMovil()"
            (aplicarFiltroRango)="aplicarFiltroRango($event)"
            (aplicarRangoPersonalizado)="aplicarRangoPersonalizado()"
            (desdeChange)="filtroDesde.set($event)"
            (hastaChange)="filtroHasta.set($event)"
            (resetearFiltro)="resetearFiltro()"
          />


          <!-- Comments Section -->
          <app-paciente-comentarios-panel
            [comentarios]="comentarios()"
            [comentariosPendientes]="comentariosPendientes()"
            [isLoading]="isLoadingComentarios()"
            [defaultExpanded]="!isMovil()"
            (irASesionComentario)="irASesionComentario($event)"
            (marcarRevisado)="marcarComentarioRevisado($event)"
            (marcarTodosRevisados)="marcarTodosRevisados()"
          />

          <!-- Plans Section -->
          <app-paciente-planes-list
            [planes]="planes()"
            [isLoading]="isLoadingPlanes()"
            [defaultExpanded]="!isMovil()"
            (verPlan)="verPlan($event)"
            (crearPlan)="crearPlan()"
            (verTodosPlanes)="verTodosPlanes()"
          />
        </aside>
      </div>
    }
  </main>
</section>
