<ui-dialog-container>
  <ui-dialog-header
    [title]="isEdit() ? 'Editar paciente' : 'Nuevo paciente'"
    (closeClick)="close()"
  ></ui-dialog-header>

  <ui-dialog-content>
    <form class="flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid gap-4 md:grid-cols-2">
        <ui-input
          label="Nombre"
          formControlName="first_name"
          [required]="true"
        ></ui-input>

        <ui-input
          label="Apellidos"
          formControlName="last_name"
        ></ui-input>
      </div>

      <ui-input
        label="Email"
        type="email"
        formControlName="email"
        [required]="true"
        [error]="emailError"
      ></ui-input>

      <ui-input
        label="Teléfono"
        type="tel"
        formControlName="telefono"
      ></ui-input>

      <ui-select
        label="Clínicas"
        formControlName="clinicas"
        [multiple]="true"
        [options]="clinicasOptions()"
        [placeholder]="clinicasPlaceholder()"
      ></ui-select>

      @if (loading()) {
        <ui-progress-bar mode="indeterminate" class="mt-2"></ui-progress-bar>
      }

      @if (error()) {
        <p class="mt-2 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
      }
    </form>
  </ui-dialog-content>

  <ui-dialog-actions>
    <ui-button variant="ghost" (clicked)="close()">Cancelar</ui-button>
    <ui-button
      variant="primary"
      [disabled]="form.invalid"
      [loading]="loading()"
      (clicked)="onSubmit()"
    >
      {{ isEdit() ? 'Guardar' : 'Crear' }}
    </ui-button>
  </ui-dialog-actions>
</ui-dialog-container>
