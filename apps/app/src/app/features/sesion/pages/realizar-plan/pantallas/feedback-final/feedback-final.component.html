<div class="feedback-container">
  <app-feedback-celebracion
    [totalEjercicios]="totalEjercicios()"
    [ejerciciosConDolor]="ejerciciosConDolor()"
    [progressOffset]="progressOffset()"
    [mostrarConfetti]="todosCompletados()"
    [modoDetallado]="modoDetallado()"
  />

  <main class="main-content">
    <div class="exercises-list">
      @if (!modoDetallado()) {
        <app-feedback-global-form
          [dolorGlobal]="dolorGlobal()"
          [totalEjercicios]="totalEjercicios()"
          [observaciones]="observacionesGenerales()"
          (dolorChange)="onDolorGlobalChange($event)"
          (observacionesChange)="onObservacionesChange($event)"
          (cambiarAModoDetallado)="activarModoDetallado()"
        />
      } @else {
        <app-feedback-detallado-form
          [ejercicios]="ejerciciosCompletados()"
          [dolorPorEjercicio]="dolorPorEjercicio()"
          [notasPorEjercicio]="notasPorEjercicio()"
          [notasExpandidas]="notasExpandidas()"
          [observaciones]="observacionesGenerales()"
          (dolorEjercicioChange)="onDolorEjercicioChange($event)"
          (notaEjercicioChange)="onNotaEjercicioChange($event)"
          (toggleNota)="onToggleNota($event)"
          (observacionesChange)="onObservacionesChange($event)"
          (volverAModoSimplificado)="desactivarModoDetallado()"
        />
      }
    </div>
  </main>

  <footer class="actions-footer">
    <div class="footer-content">
      @if (!todosCompletados()) {
        <ui2-card [padding]="10" class="incomplete-hint">
          <div class="hint-row">
            <span class="material-symbols-outlined hint-icon" aria-hidden="true">info</span>
            @if (modoDetallado()) {
              <span class="hint-text">Completa la escala de dolor de todos los ejercicios</span>
            } @else {
              <span class="hint-text">Indica cómo te sentiste durante la sesión</span>
            }
          </div>
        </ui2-card>
      }

      <ui2-button
        variant="primary"
        size="lg"
        iconRight="arrow_forward"
        [fullWidth]="true"
        [disabled]="!todosCompletados()"
        (clicked)="onFinalizar()"
      >
        Finalizar sesión
      </ui2-button>
    </div>
  </footer>
</div>
