<div
  class="ejercicio-activo-container"
  appSwipeGestures
  (swipe)="onSwipe($event)"
>
  <div class="video-section" [class.expanded]="videoExpandido()">
    <app-ejercicio-video-player
      [videoUrl]="videoUrl()"
      [posterUrl]="posterUrl()"
      [nombreEjercicio]="nombreEjercicio()"
      (playStateChange)="onPlayStateChange($event)"
    />

    <app-sesion-progress-header
      variant="overlay"
      [ejercicioIndex]="ejercicioActualIndex()"
      [totalEjercicios]="totalEjercicios()"
      [progresoPct]="progresoSesion()"
      [scrolled]="videoExpandido()"
      (salir)="salir.emit()"
    />
  </div>

  <app-ejercicio-info-panel
    [nombre]="nombreEjercicio()"
    [serieActual]="serieActual()"
    [totalSeries]="totalSeries()"
    [esTemporizador]="esTemporizador()"
    [duracionSeg]="duracionSeg()"
    [repeticiones]="repeticiones()"
    [descripcion]="descripcion()"
    [instrucciones]="instrucciones()"
    [notasFisio]="notasFisio()"
    [esDesktop]="esDesktop()"
    [videoExpandido]="videoExpandido()"
    [videoReproduciendo]="videoReproduciendo()"
    [esUltimaSerie]="esUltimaSerie()"
    (tiempoAgotado)="onTiempoAgotado()"
    (togglePanel)="togglePanel()"
    (completarSerie)="completarSerie.emit()"
    (togglePlayPause)="togglePlayPause()"
    (abrirTimeline)="abrirTimeline.emit()"
    (previewEjercicio)="previewEjercicio.emit($event)"
  />
</div>
