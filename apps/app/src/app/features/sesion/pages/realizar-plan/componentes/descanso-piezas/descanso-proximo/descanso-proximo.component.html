@if (esEntreEjercicios() && proximoEjercicio(); as proximo) {
  <button
    type="button"
    class="next-exercise-trigger"
    @fade
    (click)="previewClick.emit()"
  >
    <ui2-card [padding]="16" [radius]="22">
      <div class="next-label">
        <span class="material-symbols-outlined icon-sm" aria-hidden="true"
          >navigate_next</span
        >
        <span>Siguiente ejercicio</span>
      </div>
      <div class="next-exercise-content">
        <div class="next-exercise-thumb">
          @if (proximoPortadaUrl(); as portadaSrc) {
            <img
              [ngSrc]="portadaSrc"
              width="48"
              height="48"
              loading="lazy"
              [loaderParams]="{ fit: 'cover', quality: 80 }"
              [alt]="proximo.ejercicio.nombre"
            />
          } @else {
            <ui2-icon-badge
              icon="fitness_center"
              color="var(--ink-500)"
              [size]="48"
              [radius]="12"
            />
          }
        </div>
        <div class="next-exercise-info">
          <span class="next-exercise-name">{{ proximo.ejercicio.nombre }}</span>
          <span class="next-exercise-details">
            {{ proximo.series ?? 3 }} series ×
            @if (proximo.duracionSeg) {
              {{ proximo.duracionSeg }}s
            } @else {
              {{ proximo.repeticiones ?? 12 }} reps
            }
          </span>
        </div>
      </div>
    </ui2-card>
  </button>
} @else {
  <div class="next-series-wrapper" @fade>
    <ui2-card [padding]="14" [radius]="22">
      <div class="next-series-card">
        <div class="next-label">
          <span class="material-symbols-outlined icon-sm" aria-hidden="true"
            >navigate_next</span
          >
          <span>Próxima</span>
        </div>
        <div class="next-value">
          Serie {{ serieActual() }} de {{ totalSeries() }}
        </div>
      </div>
    </ui2-card>
  </div>
}
