<div class="global-feedback-wrapper" @fade>
  <ui2-card [padding]="20" [radius]="22">
    <article class="global-feedback-card">
      <div class="session-summary">
        <span class="material-symbols-outlined summary-icon" aria-hidden="true"
          >fitness_center</span
        >
        <span class="summary-text"
          >{{ totalEjercicios() }} ejercicios completados</span
        >
      </div>

      <app-escala-dolor
        label="¿Cómo te sentiste durante la sesión?"
        [valor]="dolorGlobal()"
        (valorChange)="onDolorChange($event)"
      />
    </article>
  </ui2-card>
</div>

<button
  type="button"
  class="expand-detail-btn"
  (click)="onCambiarAModoDetallado()"
>
  <span class="material-symbols-outlined detail-icon" aria-hidden="true">tune</span>
  <span class="detail-text">Dar feedback detallado por ejercicio</span>
  <span class="material-symbols-outlined arrow-icon" aria-hidden="true">chevron_right</span>
</button>

<div class="observations-wrapper" @fade>
  <ui2-card [padding]="20" [radius]="22">
    <div class="observations-header">
      <ui2-icon-badge
        icon="forum"
        color="var(--kengo-primary)"
        [size]="32"
        [radius]="10"
      />
      <ui2-section-label color="var(--ink-700)">
        Observaciones generales <span class="optional">(opcional)</span>
      </ui2-section-label>
    </div>
    <ui2-textarea
      placeholder="¿Algún comentario para tu fisioterapeuta?"
      [rows]="4"
      [ngModel]="observaciones()"
      (ngModelChange)="onObservacionesChange($event)"
    />
  </ui2-card>
</div>
