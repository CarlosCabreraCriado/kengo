@if (mostrarConfetti()) {
  <div class="confetti-container" aria-hidden="true">
    @for (i of confettiPieces; track i) {
      <div
        class="confetti"
        [style.--delay]="i * 0.08 + 's'"
        [style.--x]="getConfettiX(i)"
        [style.--rotation]="getConfettiRotation(i)"
      ></div>
    }
  </div>
}

<header class="floating-header">
  <div class="header-content">
    <div class="celebration-badge">
      <div class="badge-glow"></div>
      <span class="material-symbols-outlined icon-filled" aria-hidden="true">celebration</span>
    </div>

    <div class="header-info">
      <h1 class="header-title">¡Sesión completada!</h1>
      <p class="header-subtitle">Cuéntanos cómo te sentiste</p>
    </div>

    @if (modoDetallado()) {
      <div class="progress-ring-container">
        <ui2-progress-ring
          [size]="44"
          [stroke]="4"
          [value]="progressValue()"
          color="var(--kengo-primary)"
          trackColor="rgba(231, 92, 62, 0.12)"
        >
          <span class="progress-text"
            >{{ ejerciciosConDolor() }}/{{ totalEjercicios() }}</span
          >
        </ui2-progress-ring>
      </div>
    }
  </div>
</header>
