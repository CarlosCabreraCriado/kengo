<ui2-back-button
  icon="close"
  ariaLabel="Salir"
  (clicked)="onSalir($event)"
/>

<div class="progress-indicator">
  <ui2-pill variant="soft" size="sm">
    {{ ejercicioIndex() + 1 }} / {{ totalEjercicios() }}
  </ui2-pill>
  <ui2-progress-bar
    class="progress-bar"
    [value]="progresoPct()"
    size="sm"
    color="primary"
  />
</div>

<div class="header-spacer"></div>
