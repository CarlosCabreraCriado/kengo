<div class="descanso-container">
  <div class="ambient-background">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <app-sesion-progress-header
    variant="plain"
    [ejercicioIndex]="ejercicioActualIndex()"
    [totalEjercicios]="totalEjercicios()"
    [progresoPct]="progresoSesion()"
    (salir)="salir.emit()"
  />

  <main class="main-content">
    <app-descanso-respiracion
      [tiempoInicial]="tiempoDescanso()"
      [umbralAdvertencia]="5"
      (tiempoAgotado)="onTiempoAgotado()"
    />

    <app-descanso-proximo
      [esEntreEjercicios]="esDescansoEntreEjercicios()"
      [proximoEjercicio]="proximoEjercicio()"
      [proximoPortadaUrl]="proximoEjercicioPortada()"
      [serieActual]="serieActual()"
      [totalSeries]="totalSeries()"
      (previewClick)="onPreviewProximo()"
    />
  </main>

  <footer class="actions-panel">
    <button type="button" class="action-btn timeline-btn" (click)="abrirTimeline.emit()">
      <span class="material-symbols-outlined">list_alt</span>
      <span class="btn-label">Ver ejercicios</span>
    </button>

    <div class="action-buttons-row">
      <button type="button" class="action-btn secondary" (click)="onAgregarTiempo()">
        <span class="material-symbols-outlined">add</span>
        <span class="btn-label">+15s</span>
      </button>

      <button type="button" class="action-btn primary" (click)="saltar.emit()">
        <span class="btn-label">Continuar</span>
        <span class="material-symbols-outlined icon-filled">arrow_forward</span>
      </button>
    </div>
  </footer>
</div>
