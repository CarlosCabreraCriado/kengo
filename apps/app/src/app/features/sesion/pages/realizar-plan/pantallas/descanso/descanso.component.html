<div class="descanso-container">
  <app-sesion-progress-header
    variant="plain"
    [ejercicioIndex]="ejercicioActualIndex()"
    [totalEjercicios]="totalEjercicios()"
    [progresoPct]="progresoSesion()"
    (salir)="salir.emit()"
  />

  <main class="main-content">
    <app-descanso-respiracion
      [tiempoInicial]="tiempoDescanso()"
      [umbralAdvertencia]="5"
      (tiempoAgotado)="onTiempoAgotado()"
    />

    <app-descanso-proximo
      [esEntreEjercicios]="esDescansoEntreEjercicios()"
      [proximoEjercicio]="proximoEjercicio()"
      [proximoPortadaUrl]="proximoEjercicioPortada()"
      [serieActual]="serieActual()"
      [totalSeries]="totalSeries()"
      (previewClick)="onPreviewProximo()"
    />
  </main>

  <footer class="actions-panel">
    <ui2-button
      variant="secondary"
      size="md"
      iconLeft="list_alt"
      [fullWidth]="true"
      (clicked)="abrirTimeline.emit()"
    >
      Ver ejercicios
    </ui2-button>

    <div class="action-buttons-row">
      <ui2-button
        variant="secondary"
        size="lg"
        iconLeft="add"
        (clicked)="onAgregarTiempo()"
      >
        +15s
      </ui2-button>

      <ui2-button
        variant="primary"
        size="lg"
        iconRight="arrow_forward"
        [fullWidth]="true"
        (clicked)="saltar.emit()"
      >
        Continuar
      </ui2-button>
    </div>
  </footer>
</div>
