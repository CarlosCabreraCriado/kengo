<ui2-card>
  <article class="tf-root">
    <header class="tf-header">
      <ui2-avatar
        size="lg"
        gradient="coral"
        [name]="nombre()"
        [src]="avatarUrl()"
        [border]="true"
      ></ui2-avatar>

      <div class="tf-meta">
        <h3 class="tf-name">{{ nombre() }}</h3>
        <ui2-pill variant="soft" icon="medical_services">Fisioterapeuta</ui2-pill>
      </div>

      <ui2-pill variant="primary" icon="favorite" class="tf-badge">Mi fisio</ui2-pill>
    </header>

    @if (numeroColegiado()) {
      <p class="tf-colegiado">
        <span class="material-symbols-outlined" aria-hidden="true">verified</span>
        Col. {{ numeroColegiado() }}
      </p>
    }

    <div class="tf-actions">
      <a href="#" class="tf-action">
        <span class="tf-action-title">Enviar mensaje</span>
        <span class="tf-action-desc">Contacta con tu fisio.</span>
      </a>
    </div>
  </article>
</ui2-card>
