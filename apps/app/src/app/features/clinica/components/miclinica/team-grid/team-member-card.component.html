<button
  type="button"
  class="mtm"
  (click)="abrir.emit()"
  [attr.aria-label]="'Ver detalle de ' + fullName()"
>
  <ui2-avatar
    size="md"
    [gradient]="gradient()"
    [name]="fullName()"
    [src]="avatarUrl()"
  ></ui2-avatar>

  <div class="mtm__info">
    <h4 class="mtm__name">{{ fullName() }}</h4>
    <p class="mtm__role">{{ rol() }}</p>
  </div>
</button>
