<ui2-card variant="tinted" [padding]="18">
  <div class="mrc">
    <span class="mrc__badge" aria-hidden="true">
      <span class="material-symbols-outlined">{{ rolIcono() }}</span>
    </span>

    <div class="mrc__text">
      <span class="mrc__overline">Tu rol en la clínica</span>
      <h3 class="mrc__name">{{ rolNombre() | uppercase }}</h3>
    </div>
  </div>
</ui2-card>
