<div class="mch" [class.mch--with-action]="puedeEditar()">
  <div class="mch__bg" [style.background-image]="bgUrl()"></div>
  <div class="mch__overlay"></div>

  @if (puedeEditar()) {
    <div class="mch__action">
      <ui2-button
        variant="secondary"
        size="sm"
        iconLeft="edit"
        (clicked)="editarClinica.emit()"
      >
        Editar
      </ui2-button>
    </div>
  }

  <div class="mch__top">
    <p class="mch__overline">Mi clínica</p>
    <h2 class="mch__name">{{ name() }}</h2>
  </div>

  @if (address() || phone()) {
    <div class="mch__bottom">
      @if (address()) {
        <span class="mch__meta mch__meta--address">
          <span class="material-symbols-outlined mch__icon" aria-hidden="true">location_on</span>
          <span class="mch__meta-text">{{ address() }}</span>
        </span>
      }
      @if (phone()) {
        <span class="mch__meta">
          <span class="material-symbols-outlined mch__icon" aria-hidden="true">phone</span>
          <span class="mch__meta-text">{{ phone() }}</span>
        </span>
      }
    </div>
  }
</div>
