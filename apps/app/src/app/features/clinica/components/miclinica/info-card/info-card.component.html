<ui2-card [padding]="18">
  <header class="mic__head">
    <ui2-icon-badge [icon]="icon()" [color]="iconColor()" [size]="32" [radius]="9" />
    <h3 class="mic__title">{{ title() }}</h3>
  </header>

  <div class="mic__body">
    @for (f of fields(); track f.label) {
      <div class="mic__row" [attr.aria-label]="f.label">
        @if (f.icon) {
          <span class="material-symbols-outlined mic__row-icon" aria-hidden="true">
            {{ f.icon }}
          </span>
        }
        <span class="mic__row-value" [class.mic__row-value--mono]="f.mono">
          {{ f.value || '—' }}
        </span>
      </div>
    }
  </div>
</ui2-card>
