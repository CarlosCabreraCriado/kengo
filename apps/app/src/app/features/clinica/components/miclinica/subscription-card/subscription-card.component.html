<ui2-card [padding]="20">
  <div class="msc">
    <header class="msc__head">
      <span class="msc__overline">Suscripción</span>
      <ui2-pill [variant]="pillVariant()" size="sm">{{ pillTexto() }}</ui2-pill>
    </header>

    <div class="msc__plan">
      <span class="msc__plan-name">{{ plan() }}</span>
    </div>

    @if (mostrarWarning()) {
      <div class="msc__warning" role="alert">
        <span class="material-symbols-outlined msc__warning-icon" aria-hidden="true">warning</span>
        <p>{{ warningMensaje() }}</p>
      </div>
    }

    <div class="msc__cta">
      <ui2-button
        variant="primary"
        size="lg"
        iconRight="arrow_forward"
        [fullWidth]="true"
        (clicked)="irASuscripcion.emit()"
      >
        {{ ctaLabel() }}
      </ui2-button>
    </div>

    <div class="msc__footer" [class.msc__footer--warning]="trialUrgente()">
      @if (enTrial()) {
        <span class="msc__footer-label">Prueba termina</span>
        <span class="msc__footer-value">{{ trialDiasTexto() }}</span>
      } @else {
        <span class="msc__footer-label">Renovación</span>
        <span class="msc__footer-value">{{ renovacion() }}</span>
      }
    </div>
  </div>
</ui2-card>
