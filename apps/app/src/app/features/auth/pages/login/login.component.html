<ui2-cream-bg></ui2-cream-bg>

<section class="auth-shell">
  @if (verificandoSesion()) {
    <div class="auth-shell__loader">
      <ui2-spinner size="lg" label="Verificando sesión..."></ui2-spinner>
    </div>
  } @else {
    <div class="auth-shell__panel">
      <div class="auth-shell__brand">
        <img src="../../assets/logo.svg" alt="Kengo" class="auth-shell__logo" />
      </div>

      <ui2-big-title
        title="Bienvenido"
        overline="KENGO"
        sub="Inicia sesión para continuar con tus rutinas."
      ></ui2-big-title>

      <ui2-card [padding]="22">
        <div class="auth-form-wrapper">
          <form
            [formGroup]="loginForm"
            [class.auth-form--hidden]="loading()"
            [attr.aria-hidden]="loading() ? 'true' : null"
            (ngSubmit)="onSubmit()"
            class="auth-form"
          >
            <ui2-input
              label="Email"
              type="email"
              placeholder="tu@email.com"
              iconLeft="mail"
              autocomplete="email"
              enterkeyhint="next"
              name="email"
              formControlName="email"
              [error]="emailError ?? null"
            ></ui2-input>

            <div class="auth-form__field">
              <ui2-input
                label="Contraseña"
                type="password"
                placeholder="••••••••"
                iconLeft="lock"
                autocomplete="current-password"
                enterkeyhint="go"
                name="password"
                formControlName="password"
                [error]="passwordError ?? null"
              ></ui2-input>
              <a
                routerLink="/recuperar-password"
                class="auth-form__link auth-form__link--end"
                [class.auth-form__link--disabled]="loading()"
              >
                He olvidado mi contraseña
              </a>
            </div>

            @if (error()) {
              <p class="auth-form__error" role="alert">{{ error() }}</p>
            }

            <ui2-button
              type="submit"
              variant="primary"
              size="lg"
              [fullWidth]="true"
              [disabled]="loginForm.invalid || loading()"
            >
              Iniciar sesión
            </ui2-button>

            <a
              routerLink="/registro"
              class="auth-form__link auth-form__link--center"
              [class.auth-form__link--disabled]="loading()"
            >
              ¿No tienes cuenta? <span>Regístrate</span>
            </a>
          </form>

          @if (loading()) {
            <div class="auth-form__overlay">
              <ui2-spinner size="lg"></ui2-spinner>
            </div>
          }
        </div>
      </ui2-card>
    </div>
  }
</section>
