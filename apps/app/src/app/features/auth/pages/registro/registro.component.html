<section
  class="absolute top-0 left-0 flex h-dvh w-screen items-center justify-center px-2"
>
  <div
    class="flex w-full max-w-lg flex-col justify-center rounded-2xl border-white/20 bg-white/60 px-6 py-5 shadow-xl backdrop-blur-md backdrop-filter"
  >
    <div class="baseline-end relative flex h-15 w-full items-end justify-center">
      <img src="../../assets/logo.svg" class="relative h-[175%]" alt="Kengo logo" />
    </div>

    <div class="fuente-kengo mb-4 w-full text-center text-3xl">Registro</div>

    <!-- Error global -->
    @if (error()) {
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
        {{ error() }}
      </div>
    }

    <ui-stepper #stepper [selectedIndex]="currentStep()" [linear]="true" (selectionChange)="onStepChange($event)">
      <!-- Paso 1: Datos -->
      <ui-step label="Datos">
        <form [formGroup]="datosForm" class="flex flex-col gap-4 pt-4">
          <ui-input
            label="Nombre"
            formControlName="nombre"
            [required]="true"
            [error]="nombreError"
          ></ui-input>

          <ui-input
            label="Apellidos"
            formControlName="apellidos"
            [required]="true"
            [error]="apellidosError"
          ></ui-input>

          <ui-input
            label="Email"
            type="email"
            formControlName="email"
            [required]="true"
            [error]="emailError"
          ></ui-input>

          <div class="mt-2 flex justify-end">
            <ui-button
              variant="primary"
              iconRight="arrow_forward"
              [disabled]="!datosForm.valid"
              (clicked)="nextStep()"
            >
              Siguiente
            </ui-button>
          </div>
        </form>
      </ui-step>

      <!-- Paso 2: Tipo de usuario -->
      <ui-step label="Tipo">
        <form [formGroup]="tipoUsuarioForm" class="flex flex-col gap-4 pt-4">
          <ui-radio-group
            label="Selecciona tu rol *"
            formControlName="tipo"
            [options]="tipoUsuarioOptions"
          ></ui-radio-group>

          <div class="mt-2 flex justify-between">
            <ui-button
              variant="ghost"
              iconLeft="arrow_back"
              (clicked)="previousStep()"
            >
              Anterior
            </ui-button>
            <ui-button
              variant="primary"
              iconRight="arrow_forward"
              [disabled]="!tipoUsuarioForm.valid"
              (clicked)="nextStep()"
            >
              Siguiente
            </ui-button>
          </div>
        </form>
      </ui-step>

      <!-- Paso 3: Codigo clinica -->
      <ui-step label="Codigo" [optional]="true">
        <form [formGroup]="codigoClinicaForm" class="flex flex-col gap-4 pt-4">
          <ui-input
            label="Codigo de clinica (opcional)"
            formControlName="codigo"
            placeholder="Ingresa el codigo si te lo proporcionaron"
            hint="Si tu fisioterapeuta te dio un codigo, ingresalo aqui"
          ></ui-input>

          <div class="mt-2 flex justify-between">
            <ui-button
              variant="ghost"
              iconLeft="arrow_back"
              (clicked)="previousStep()"
            >
              Anterior
            </ui-button>
            <ui-button
              variant="primary"
              iconRight="arrow_forward"
              (clicked)="nextStep()"
            >
              Siguiente
            </ui-button>
          </div>
        </form>
      </ui-step>

      <!-- Paso 4: Contrasena -->
      <ui-step label="Seguridad">
        <form [formGroup]="passwordForm" class="flex flex-col gap-4 pt-4">
          <ui-input
            label="Contrasena"
            type="password"
            formControlName="password"
            [required]="true"
            [error]="passwordError"
          ></ui-input>

          <ui-input
            label="Repetir contrasena"
            type="password"
            formControlName="repetir"
            [required]="true"
            [error]="repetirError"
          ></ui-input>

          <div class="mt-2 flex justify-between">
            <ui-button
              variant="ghost"
              iconLeft="arrow_back"
              [disabled]="isLoading()"
              (clicked)="previousStep()"
            >
              Anterior
            </ui-button>
            <ui-button
              variant="primary"
              [iconLeft]="isLoading() ? undefined : 'check'"
              [disabled]="!passwordForm.valid || !passwordsMatch"
              [loading]="isLoading()"
              (clicked)="completarRegistro()"
            >
              {{ isLoading() ? 'Registrando...' : 'Finalizar' }}
            </ui-button>
          </div>
        </form>
      </ui-step>
    </ui-stepper>

    <a
      class="mt-4 block text-center text-sm font-medium text-primary underline underline-offset-2 transition-colors hover:text-primary/80"
      routerLink="/login"
    >
      Ya tengo cuenta
    </a>
  </div>
</section>
