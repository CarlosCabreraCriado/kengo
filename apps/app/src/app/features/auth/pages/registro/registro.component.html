<ui2-cream-bg></ui2-cream-bg>

<section class="auth-shell">
  <div class="auth-shell__panel auth-shell__panel--wide">
    <div class="auth-shell__brand">
      <img src="../../assets/logo.svg" alt="Kengo" class="auth-shell__logo" />
    </div>

    <ui2-big-title
      title="Crea tu cuenta"
      overline="REGISTRO"
      sub="Configura tu perfil en cuatro pasos."
    ></ui2-big-title>

    @if (error()) {
      <p class="auth-form__error" role="alert">{{ error() }}</p>
    }

    <ui2-card [padding]="22">
      <ui2-stepper
        #stepper
        [selectedIndex]="currentStep()"
        [linear]="true"
        (selectionChange)="onStepChange($event)"
      >
        <ui2-step label="Datos">
          <form [formGroup]="datosForm" class="auth-form">
            <ui2-input
              label="Nombre"
              placeholder="Tu nombre"
              iconLeft="person"
              autocomplete="given-name"
              [required]="true"
              formControlName="nombre"
              [error]="nombreError ?? null"
            ></ui2-input>

            <ui2-input
              label="Apellidos"
              placeholder="Tus apellidos"
              iconLeft="badge"
              autocomplete="family-name"
              [required]="true"
              formControlName="apellidos"
              [error]="apellidosError ?? null"
            ></ui2-input>

            <ui2-input
              label="Email"
              type="email"
              placeholder="tu@email.com"
              iconLeft="mail"
              autocomplete="email"
              [required]="true"
              formControlName="email"
              [error]="emailError ?? null"
            ></ui2-input>

            <div class="auth-form__nav auth-form__nav--end">
              <ui2-button
                variant="primary"
                iconRight="arrow_forward"
                [disabled]="!datosForm.valid"
                (clicked)="nextStep()"
              >
                Siguiente
              </ui2-button>
            </div>
          </form>
        </ui2-step>

        <ui2-step label="Tipo">
          <form [formGroup]="tipoUsuarioForm" class="auth-form">
            <ui2-radio-group
              label="Selecciona tu rol"
              formControlName="tipo"
              [options]="tipoUsuarioOptions"
            ></ui2-radio-group>

            <div class="auth-form__nav">
              <ui2-button variant="ghost" iconLeft="arrow_back" (clicked)="previousStep()">
                Anterior
              </ui2-button>
              <ui2-button
                variant="primary"
                iconRight="arrow_forward"
                [disabled]="!tipoUsuarioForm.valid"
                (clicked)="nextStep()"
              >
                Siguiente
              </ui2-button>
            </div>
          </form>
        </ui2-step>

        <ui2-step label="Código" [optional]="true">
          <form [formGroup]="codigoClinicaForm" class="auth-form">
            <ui2-input
              label="Código de clínica (opcional)"
              placeholder="Ingresa el código si te lo proporcionaron"
              iconLeft="qr_code_2"
              hint="Si tu fisioterapeuta te dio un código, ingrésalo aquí."
              formControlName="codigo"
            ></ui2-input>

            <div class="auth-form__nav">
              <ui2-button variant="ghost" iconLeft="arrow_back" (clicked)="previousStep()">
                Anterior
              </ui2-button>
              <ui2-button variant="primary" iconRight="arrow_forward" (clicked)="nextStep()">
                Siguiente
              </ui2-button>
            </div>
          </form>
        </ui2-step>

        <ui2-step label="Seguridad">
          <form [formGroup]="passwordForm" class="auth-form">
            <ui2-input
              label="Contraseña"
              type="password"
              placeholder="Mínimo 8 caracteres"
              iconLeft="lock"
              autocomplete="new-password"
              [required]="true"
              formControlName="password"
              [error]="passwordError ?? null"
            ></ui2-input>

            <ui2-input
              label="Repetir contraseña"
              type="password"
              placeholder="Repite tu contraseña"
              iconLeft="lock"
              autocomplete="new-password"
              [required]="true"
              formControlName="repetir"
              [error]="repetirError ?? null"
            ></ui2-input>

            <div class="auth-form__nav">
              <ui2-button
                variant="ghost"
                iconLeft="arrow_back"
                [disabled]="isLoading()"
                (clicked)="previousStep()"
              >
                Anterior
              </ui2-button>
              <ui2-button
                variant="primary"
                iconLeft="check"
                [disabled]="!passwordForm.valid || !passwordsMatch"
                [loading]="isLoading()"
                (clicked)="completarRegistro()"
              >
                {{ isLoading() ? 'Registrando...' : 'Finalizar' }}
              </ui2-button>
            </div>
          </form>
        </ui2-step>
      </ui2-stepper>
    </ui2-card>

    <a routerLink="/login" class="auth-form__link auth-form__link--center">
      ¿Ya tienes cuenta? <span>Inicia sesión</span>
    </a>
  </div>
</section>
