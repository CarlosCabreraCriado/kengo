<ui2-cream-bg></ui2-cream-bg>

<section class="auth-shell">
  <div class="auth-shell__panel">
    <div class="auth-shell__brand">
      <img src="../../assets/logo.svg" alt="Kengo" class="auth-shell__logo" />
    </div>

    @if (loading()) {
      <ui2-big-title
        title="Verificando enlace"
        overline="MAGIC LINK"
        sub="Estamos validando tu acceso, un momento."
      ></ui2-big-title>

      <ui2-card [padding]="22">
        <div class="magic-state">
          <ui2-spinner size="lg" color="primary"></ui2-spinner>
        </div>
      </ui2-card>
    } @else if (errorMessage()) {
      <ui2-big-title
        title="Enlace no válido"
        overline="MAGIC LINK"
        [color]="'var(--danger)'"
      ></ui2-big-title>

      <ui2-card [padding]="22">
        <div class="magic-state">
          <span class="material-symbols-outlined magic-state__icon" aria-hidden="true">error</span>
          <p class="magic-state__message">{{ errorMessage() }}</p>
          <ui2-button variant="primary" iconLeft="arrow_back" (clicked)="volverAlLogin()">
            Volver al inicio
          </ui2-button>
        </div>
      </ui2-card>
    }
  </div>
</section>
