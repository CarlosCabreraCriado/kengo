<ui2-cream-bg></ui2-cream-bg>

<section class="auth-shell">
  <div class="auth-shell__panel">
    <div class="auth-shell__brand">
      <img src="../../assets/logo.svg" alt="Kengo" class="auth-shell__logo" />
    </div>

    <ui2-big-title
      title="Establece tu contraseña"
      overline="PRIMER ACCESO"
      sub="Necesitas una contraseña para acceder a tu cuenta en el futuro."
    ></ui2-big-title>

    <ui2-card [padding]="22">
      <div class="auth-form-wrapper">
        <form
          [formGroup]="form"
          [class.auth-form--hidden]="loading()"
          [attr.aria-hidden]="loading() ? 'true' : null"
          (ngSubmit)="onSubmit()"
          class="auth-form"
        >
          <ui2-input
            label="Contraseña"
            type="password"
            placeholder="Mínimo 8 caracteres"
            iconLeft="lock"
            autocomplete="new-password"
            formControlName="password"
            [error]="passwordError ?? null"
          ></ui2-input>

          <ui2-input
            label="Repetir contraseña"
            type="password"
            placeholder="Repite tu contraseña"
            iconLeft="lock"
            autocomplete="new-password"
            formControlName="repetir"
            [error]="repetirError ?? null"
          ></ui2-input>

          @if (error()) {
            <p class="auth-form__error" role="alert">{{ error() }}</p>
          }

          <ui2-button
            type="submit"
            variant="primary"
            size="lg"
            iconLeft="lock_reset"
            [fullWidth]="true"
            [disabled]="form.invalid || loading()"
          >
            Guardar y acceder
          </ui2-button>
        </form>

        @if (loading()) {
          <div class="auth-form__overlay">
            <ui2-spinner size="lg"></ui2-spinner>
          </div>
        }
      </div>
    </ui2-card>
  </div>
</section>
