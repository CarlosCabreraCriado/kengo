<section
  class="absolute top-0 left-0 flex h-dvh w-screen items-center justify-center"
>
  <div
    class="flex w-80 flex-col justify-center rounded-2xl border-white/20 bg-white/60 px-6 py-3 shadow-xl backdrop-blur-md backdrop-filter"
  >
    <div
      class="baseline-end relative flex h-15 w-full items-end justify-center"
    >
      <img src="../../assets/logo.svg" class="relative h-[175%]" />
    </div>

    <div class="fuente-kengo mb-2 w-full text-center text-3xl">Kengo</div>

    <div class="relative">
      @if (!enviado()) {
        <form
          [formGroup]="form"
          [class.invisible]="loading()"
          [attr.aria-hidden]="loading() ? 'true' : null"
          (ngSubmit)="onSubmit()"
          class="flex w-full flex-col gap-4"
        >
          <p class="text-center text-sm text-gray-600">
            Introduce tu email y te enviaremos un codigo para restablecer tu
            contrasena.
          </p>

          <ui-input
            label="Email"
            type="email"
            formControlName="email"
            [error]="emailError"
          ></ui-input>

          <ui-button
            type="submit"
            variant="primary"
            size="lg"
            [fullWidth]="true"
            [disabled]="form.invalid || loading()"
          >
            Enviar codigo
          </ui-button>

          <a
            routerLink="/login"
            class="flex h-10 w-full items-center justify-center rounded-xl text-sm font-medium text-primary transition-colors hover:bg-primary/10"
            [class.pointer-events-none]="loading()"
            [class.opacity-50]="loading()"
          >
            Volver al inicio de sesion
          </a>

          @if (error()) {
            <div
              class="rounded-lg bg-red-50 px-3 py-2 text-center text-sm text-red-600"
            >
              {{ error() }}
            </div>
          }
        </form>

        @if (loading()) {
          <div class="absolute inset-0 flex items-center justify-center">
            <ui-spinner size="lg"></ui-spinner>
          </div>
        }
      } @else {
        <!-- Mensaje de exito -->
        <div class="flex flex-col items-center gap-4 py-4">
          <div
            class="flex h-16 w-16 items-center justify-center rounded-full bg-green-100"
          >
            <svg
              class="h-8 w-8 text-green-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
          </div>
          <div class="text-center">
            <p class="font-semibold text-gray-900">Codigo enviado</p>
            <p class="mt-1 text-sm text-gray-600">
              Revisa tu bandeja de entrada. Redirigiendo...
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
