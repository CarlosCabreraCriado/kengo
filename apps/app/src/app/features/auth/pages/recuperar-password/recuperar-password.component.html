<ui2-cream-bg></ui2-cream-bg>

<section class="auth-shell">
  <div class="auth-shell__panel">
    <div class="auth-shell__brand">
      <img src="../../assets/logo.svg" alt="Kengo" class="auth-shell__logo" />
    </div>

    <ui2-big-title
      title="Recuperar acceso"
      overline="CONTRASEÑA"
      sub="Te enviaremos un código de verificación por email."
    ></ui2-big-title>

    <ui2-card [padding]="22">
      @if (!enviado()) {
        <div class="auth-form-wrapper">
          <form
            [formGroup]="form"
            [class.auth-form--hidden]="loading()"
            [attr.aria-hidden]="loading() ? 'true' : null"
            (ngSubmit)="onSubmit()"
            class="auth-form"
          >
            <ui2-input
              label="Email"
              type="email"
              placeholder="tu@email.com"
              iconLeft="mail"
              autocomplete="email"
              formControlName="email"
              [error]="emailError ?? null"
            ></ui2-input>

            @if (error()) {
              <p class="auth-form__error" role="alert">{{ error() }}</p>
            }

            <ui2-button
              type="submit"
              variant="primary"
              size="lg"
              [fullWidth]="true"
              [disabled]="form.invalid || loading()"
            >
              Enviar código
            </ui2-button>

            <a
              routerLink="/login"
              class="auth-form__link auth-form__link--center"
              [class.auth-form__link--disabled]="loading()"
            >
              Volver al inicio de sesión
            </a>
          </form>

          @if (loading()) {
            <div class="auth-form__overlay">
              <ui2-spinner size="lg"></ui2-spinner>
            </div>
          }
        </div>
      } @else {
        <div class="magic-state">
          <span class="material-symbols-outlined magic-state__icon magic-state__icon--success" aria-hidden="true">mark_email_read</span>
          <p class="magic-state__title">Código enviado</p>
          <p class="magic-state__message">Revisa tu bandeja de entrada. Redirigiendo...</p>
        </div>
      }
    </ui2-card>
  </div>
</section>
