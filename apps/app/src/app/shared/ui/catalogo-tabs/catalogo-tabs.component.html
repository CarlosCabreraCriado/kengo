<nav class="toggle-nav" aria-label="Navegación entre ejercicios y rutinas">
  @for (tab of tabs(); track tab.path) {
    <a
      [routerLink]="'/' + tab.path"
      routerLinkActive="active"
      class="toggle-item"
    >
      <span class="material-symbols-outlined toggle-icon">{{ tab.icon }}</span>
      <span class="toggle-label">{{ tab.label }}</span>
    </a>
  }
</nav>
