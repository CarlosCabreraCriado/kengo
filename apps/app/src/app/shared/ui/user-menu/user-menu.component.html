@if (open()) {
  <div class="user-menu" role="menu">
    <button
      type="button"
      class="menu-item"
      role="menuitem"
      (click)="irAPerfil()"
    >
      <span class="material-symbols-outlined">person</span>
      <span>Mi perfil</span>
    </button>

    @if (sessionService.puedeAlternarModo()) {
      <button
        type="button"
        class="menu-item menu-item-switch"
        role="switch"
        [attr.aria-checked]="modoPaciente()"
        (click)="onToggleModo($event)"
        (keydown.space)="onToggleModo($event)"
        (keydown.enter)="onToggleModo($event)"
      >
        <span class="material-symbols-outlined">accessibility_new</span>
        <span class="menu-item-label">Modo paciente</span>
        <span class="ios-switch" [class.on]="modoPaciente()" aria-hidden="true">
          <span class="ios-switch-thumb"></span>
        </span>
      </button>
    }

    <button
      type="button"
      class="menu-item menu-item-danger"
      role="menuitem"
      (click)="cerrarSesion()"
    >
      <span class="material-symbols-outlined">logout</span>
      <span>Cerrar sesión</span>
    </button>
  </div>

  <div class="menu-backdrop" (click)="cerrar()" aria-hidden="true"></div>
}
