<!-- Modo paciente con navegación: shell V2 cream wellness (responsive) -->
@if (mostrarNavegacion && sessionService.enModoPaciente()) {
  <ui2-cream-bg></ui2-cream-bg>

  @if (esDesktop()) {
    <!-- Desktop shell: sidebar fija + topbar + main scrollable -->
    <section class="flex h-dvh flex-row relative z-10">
      <ui2-patient-sidebar
        class="shrink-0 h-full"
        [userName]="firstName()"
        [userSubtitle]="userSubtitle()"
        [avatarUrl]="avatarUrl()"
        [clinicaNombre]="clinicaActual()"
      ></ui2-patient-sidebar>
      <div class="flex-1 flex flex-col min-w-0">
        <ui2-web-topbar
          [userName]="firstName()"
          [avatarUrl]="avatarUrl()"
        ></ui2-web-topbar>
        <main class="flex-1 min-h-0 overflow-y-auto">
          <router-outlet></router-outlet>
        </main>
      </div>
    </section>
  } @else {
    <!-- Mobile shell: header floating + main scrollable + tab bar floating -->
    <section class="flex h-dvh max-w-3xl flex-col m-auto overflow-hidden relative z-10">
      <ui2-patient-header
        [clinica]="clinicaActual()"
        [userName]="userName()"
        [avatarUrl]="avatarUrl()"
      ></ui2-patient-header>
      <main class="flex-1 min-h-0 overflow-y-auto" style="padding-top: 56px; padding-bottom: 110px;">
        <router-outlet></router-outlet>
      </main>
      <ui2-patient-tab-bar></ui2-patient-tab-bar>
    </section>
  }
}

<!-- Modo fisio con navegación -->
@if (mostrarNavegacion && sessionService.enModoFisio()) {
  @if (enRutaV2Fisio()) {
    <!-- Shell V2 (cream wellness) — solo activo bajo /inicio/fisio. -->
    <ui2-cream-bg></ui2-cream-bg>

    <!-- Carrito V2 (overlay flotante) — visible solo bajo el shell V2 fisio. -->
    <ui2-carrito-ejercicios></ui2-carrito-ejercicios>

    @if (esDesktop()) {
      <!-- Desktop: sidebar + topbar + main scrollable -->
      <section class="flex h-dvh flex-row relative z-10">
        <ui2-patient-sidebar
          class="shrink-0 h-full"
          brandTag="FISIOTERAPIA"
          [groups]="fisioSidebarGroups"
          [userName]="firstName()"
          [userSubtitle]="userSubtitle()"
          [avatarUrl]="avatarUrl()"
          [clinicaNombre]="clinicaActual()"
        ></ui2-patient-sidebar>
        <div class="flex-1 flex flex-col min-w-0">
          <ui2-web-topbar
            [userName]="firstName()"
            [avatarUrl]="avatarUrl()"
          ></ui2-web-topbar>
          <main class="flex-1 min-h-0 flex flex-col overflow-y-auto">
            <router-outlet></router-outlet>
          </main>
        </div>
      </section>
    } @else {
      <!-- Mobile: header floating + main scrollable + tab bar floating -->
      <section class="flex h-dvh max-w-3xl flex-col m-auto overflow-hidden relative z-10">
        <ui2-patient-header
          [clinica]="clinicaActual()"
          [userName]="userName()"
          [avatarUrl]="avatarUrl()"
        ></ui2-patient-header>
        <main class="flex-1 min-h-0 flex flex-col overflow-y-auto" style="padding-top: 56px; padding-bottom: 110px;">
          <router-outlet></router-outlet>
        </main>
        <ui2-patient-tab-bar [tabs]="fisioTabBarTabs"></ui2-patient-tab-bar>
      </section>
    }
  } @else {
    <!-- Shell legacy del modo fisio (resto de pantallas, hasta migrarlas a V2) -->
    <section class="flex h-dvh max-w-7xl flex-col m-auto overflow-hidden">
      <!-- Fondo decorativo -->
      <div class="fixed top-0 left-0 -z-10 h-dvh w-screen overflow-hidden">
      <!-- SVG con ondas dinámicas - colores basados en el tema de la clínica -->
      <svg
        class="fixed bottom-0 left-0 -z-10 min-w-screen rotate-180"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 1730 992"
        preserveAspectRatio="xMidYMid"
        width="1730"
        height="992"
        style="shape-rendering: auto; display: block; background: transparent;"
      >
        <defs>
          <linearGradient id="wave-gradient-0" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style="stop-color: var(--kengo-svg-wave-1)" />
            <stop offset="1" style="stop-color: var(--kengo-svg-wave-2)" />
          </linearGradient>
          <linearGradient id="wave-gradient-1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style="stop-color: var(--kengo-svg-wave-2)" />
            <stop offset="1" style="stop-color: var(--kengo-svg-wave-3)" />
          </linearGradient>
        </defs>
        <g>
          <path fill-opacity="0.5" fill="url(#wave-gradient-0)" d="M0 0L0 816.55Q288.33 739.18 576.67 706.65T1153.33 639.37T1730 497.68L1730 0Z">
            <animate
              attributeName="d"
              values="M0 0L0 816.55Q288.33 739.18 576.67 706.65T1153.33 639.37T1730 497.68L1730 0Z;M0 0L0 801.97Q288.33 783.61 576.67 761.57T1153.33 611.56T1730 538.74L1730 0Z;M0 0L0 861.14Q288.33 789.16 576.67 764.35T1153.33 633.06T1730 503.65L1730 0Z;M0 0L0 816.55Q288.33 739.18 576.67 706.65T1153.33 639.37T1730 497.68L1730 0Z"
              keyTimes="0;0.333;0.667;1"
              keySplines="0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1"
              calcMode="spline"
              dur="33.33s"
              repeatCount="indefinite"
              begin="0s"
            />
          </path>
          <path fill-opacity="0.8" fill="url(#wave-gradient-1)" d="M0 0L0 405.20Q288.33 389.26 576.67 343.88T1153.33 268.76T1730 253.26L1730 0Z">
            <animate
              attributeName="d"
              values="M0 0L0 405.20Q288.33 389.26 576.67 343.88T1153.33 268.76T1730 253.26L1730 0Z;M0 0L0 424.88Q288.33 369.72 576.67 334.51T1153.33 293.36T1730 291.58L1730 0Z;M0 0L0 423.86Q288.33 404.38 576.67 384.80T1153.33 335.63T1730 238.76L1730 0Z;M0 0L0 405.20Q288.33 389.26 576.67 343.88T1153.33 268.76T1730 253.26L1730 0Z"
              keyTimes="0;0.333;0.667;1"
              keySplines="0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1"
              calcMode="spline"
              dur="33.33s"
              repeatCount="indefinite"
              begin="-16.67s"
            />
          </path>
        </g>
      </svg>

      <div class="kengoBackground fixed -z-20">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <app-navegacion class="order-2 md:order-1 flex-shrink-0"></app-navegacion>

    <main
      class="main z-10 flex-1 min-h-0 flex flex-col order-1 md:order-2 pt-nav"
    >
      <router-outlet></router-outlet>
    </main>

    <app-carrito-ejercicios></app-carrito-ejercicios>
  </section>
  }
}

<!-- Auth / sin navegación: layout mínimo -->
@if (!mostrarNavegacion) {
  <section class="flex h-dvh max-w-7xl flex-col m-auto overflow-hidden">
    <main class="main z-10 flex-1 min-h-0 flex flex-col">
      <router-outlet></router-outlet>
    </main>
  </section>
}

<!-- Indicador de breakpoint (desarrollo) -->
<div
  class="fixed right-0 bottom-0 z-50 bg-red-700 sm:bg-yellow-700 md:bg-purple-500 lg:bg-blue-700 xl:bg-green-700"
>
  <span class="block text-white sm:hidden">M</span>
  <span class="hidden text-white sm:block md:hidden">SM</span>
  <span class="hidden text-white md:block lg:hidden">MD</span>
  <span class="hidden text-white lg:block xl:hidden">LG</span>
  <span class="hidden text-white xl:block">XL</span>
</div>
