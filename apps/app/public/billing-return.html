<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Volviendo a Kengo…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --kengo-coral: #e75c3e;
        --cream-50: #fdf8f1;
        --ink-700: #374151;
        --ink-500: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--cream-50); }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
        color: var(--ink-700);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 360px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f7eedf;
        border-top-color: var(--kengo-coral);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.25rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.95rem;
        color: var(--ink-500);
        margin: 0.4rem 0;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        color: var(--kengo-coral);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Volviendo a la app…</h1>
      <p>En unos segundos te llevaremos de vuelta a Kengo.</p>
      <a id="fallback" href="kengo://billing/return?status=success">Si no se abre automáticamente, toca aquí</a>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var status = params.get('status') || 'success';
        // Permitidos: success | cancel | portal. Pasamos cualquier otro valor
        // tal cual; la app decide cómo interpretarlo.
        var deepLink = 'kengo://billing/return?status=' + encodeURIComponent(status);
        var fallback = document.getElementById('fallback');
        if (fallback) fallback.setAttribute('href', deepLink);
        // Lanzar el deep link inmediatamente. iOS/Android muestran el prompt
        // "¿Abrir en Kengo?" y, al aceptar, cierran el SFSafariViewController /
        // Custom Tab y entregan la URL al listener `appUrlOpen` de Capacitor.
        location.replace(deepLink);
      })();
    </script>
  </body>
</html>
